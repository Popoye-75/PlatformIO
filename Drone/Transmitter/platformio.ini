[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328new
framework = arduino
monitor_speed = 9600
lib_deps = 
	nrf24/RF24
	adafruit/Adafruit ST7735 and ST7789 Library @ ^1.10.4
	adafruit/Adafruit GFX Library@^1.12.6
	adafruit/Adafruit SSD1306@^2.5.17
	thomasfredericks/Bounce2@^2.72.0
	paulstoffregen/Encoder@^1.4.4
